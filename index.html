<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOLVOLT Logo Set</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1A1E25;
    --ganit: #ececec;
    --white: #FFFFFF;
    --orange: #FF8600;
    --border: #E6E2DC;
    --text-muted: #6B7280;
    --shadow-soft: 0 2px 6px rgba(15, 23, 42, 0.06), 0 1px 2px rgba(15, 23, 42, 0.05);
    --shadow-lift: 0 10px 24px rgba(15, 23, 42, 0.10), 0 2px 6px rgba(15, 23, 42, 0.06);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--ganit);
    color: var(--navy);
    font-family: "Open Sans", sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .page {
    max-width: 980px;
    margin: 0 auto;
    padding: 56px 24px 120px;
  }

  header.page-head {
    text-align: center;
    margin-bottom: 48px;
  }

  h1.page-title {
    font-family: "Open Sans", sans-serif;
    font-weight: 600;
    font-size: clamp(28px, 5vw, 40px);
    margin: 0 0 10px;
    letter-spacing: -0.01em;
  }

  p.page-sub {
    margin: 0;
    color: var(--text-muted);
    font-size: 15px;
    line-height: 1.5;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 28px;
  }

  @media (max-width: 700px) {
    .grid { grid-template-columns: 1fr; }
  }

  .card {
    background: var(--white);
    border-radius: 14px;
    box-shadow: var(--shadow-soft);
    padding: 22px;
  }

  .card-title {
    font-family: "Open Sans", sans-serif;
    font-weight: 600;
    font-size: 17px;
    margin: 0 0 14px;
  }

  .logo-pair {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
  }

  .logo-box {
    position: relative;
    flex: 1 1 130px;
    min-height: 110px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: zoom-in;
    transition: box-shadow 0.15s ease, transform 0.15s ease;
    border: 1px solid var(--border);
    overflow: hidden;
  }

  .logo-box:hover {
    box-shadow: var(--shadow-lift);
    transform: translateY(-1px);
  }

  .logo-box[data-mode="dark"] {
    background: var(--navy);
    border-color: var(--navy);
  }

  .logo-box[data-mode="light"] {
    background: var(--white);
  }

  .logo-box .logo-img {
    max-width: 75%;
    max-height: 64px;
    object-fit: contain;
  }

  .mode-label {
    position: absolute;
    bottom: 8px;
    left: 10px;
    font-size: 11px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--text-muted);
    z-index: 3;
  }

  .logo-box[data-mode="dark"] .mode-label { color: rgba(247,245,242,0.55); }

  .tick-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: var(--white);
    color: transparent;
    font-size: 13px;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.15s ease;
    padding: 0;
    z-index: 3;
  }

  .logo-box[data-mode="dark"] .tick-btn {
    border-color: rgba(247,245,242,0.4);
    background: rgba(26,35,50,0.6);
  }

  .tick-btn:hover { border-color: var(--orange); }

  .tick-btn.selected {
    background: var(--orange);
    border-color: var(--orange);
    color: var(--white);
  }

  .logo-box.selected {
    box-shadow: 0 0 0 2px var(--orange);
  }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(26, 35, 50, 0.55);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.18s ease;
    z-index: 100;
  }

  .modal-overlay.open { opacity: 1; visibility: visible; }

  .modal-box {
    background: var(--white);
    border-radius: 14px;
    max-width: 760px;
    width: 100%;
    padding: 32px;
    text-align: center;
    box-shadow: var(--shadow-lift);
    transform: translateY(8px);
    transition: transform 0.18s ease;
  }

  .modal-overlay.open .modal-box { transform: translateY(0); }

  .modal-box[data-mode="dark"] {
    background: var(--navy);
  }

  .modal-box[data-mode="dark"] .modal-title {
    color: var(--ganit);
  }

  .modal-box[data-mode="dark"] .modal-close {
    color: var(--ganit);
    border-color: rgba(247,245,242,0.4);
  }

  .modal-box[data-mode="dark"] .modal-close:hover {
    border-color: var(--orange);
  }

  .modal-stage {
    position: relative;
    border-radius: 10px;
    min-height: 420px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 18px;
  }

  .modal-stage .logo-img {
    max-width: 100%;
    max-height: 520px;
    width: auto;
    height: auto;
    object-fit: contain;
  }

  /* Compare layout: two self-contained panels, each carrying its own
     dark/light background, sitting inside the neutral modal box */
  .compare-grid {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
    width: 100%;
  }

  .compare-panel {
    flex: 1 1 260px;
    border-radius: 12px;
    border: 1px solid var(--border);
    padding: 28px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  .compare-panel[data-mode="dark"] {
    background: var(--navy);
    border-color: var(--navy);
  }

  .compare-panel[data-mode="light"] {
    background: var(--white);
  }

  .compare-panel .logo-img {
    max-width: 90%;
    max-height: 220px;
  }

  .compare-label {
    font-size: 13px;
    color: var(--text-muted);
  }

  .compare-panel[data-mode="dark"] .compare-label {
    color: rgba(247,245,242,0.65);
  }

  .modal-title {
    font-family: "Open Sans", sans-serif;
    font-size: 16px;
    font-weight: 600;
    margin: 0 0 4px;
  }

  .modal-close {
    margin-top: 18px;
    border: 1px solid var(--border);
    background: none;
    border-radius: 8px;
    padding: 8px 18px;
    font-family: "Open Sans", sans-serif;
    font-size: 14px;
    cursor: pointer;
    color: var(--navy);
  }

  .modal-close:hover { border-color: var(--navy); }
</style>
</head>
<body>

<div class="page">
  <header class="page-head">
    <h1 class="page-title">SOLVOLT Logo Set</h1>
    <p class="page-sub">Tap a logo to view it larger. Tick two logos to compare them side by side.</p>
  </header>

  <div class="grid" id="grid"></div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box" id="modalBox">
    <div class="modal-stage" id="modalStage"></div>
    <p class="modal-title" id="modalTitle"></p>
    <button class="modal-close" id="modalClose">Close</button>
  </div>
</div>

<script>
  // ====================================================================
  // PNG FILES
  // --------------------------------------------------------------------
  // 8 boxes in this fixed order: primary-dark, primary-light, icon-dark,
  // icon-light, wordmark-dark, wordmark-light, stacked-dark, stacked-light.
  // Drop matching PNGs into the repo with these filenames (or rename the
  // entries below to whatever you've actually named the files).
  // ====================================================================
  const PNG_FILES = [
    '1.png', // primary  / dark
    '2.png', // primary  / light
    '3.png', // icon     / dark
    '4.png', // icon     / light
    '5.png', // wordmark / dark
    '6.png', // wordmark / light
    '7.png', // stacked  / dark
    '8.png'  // stacked  / light
  ];

  const LOGO_SETS = [
    { id: 'original',  title: 'Original' },
    { id: 'logo-1',     title: 'Logo 1' },
    { id: 'logo-2', title: 'Logo 2' },
    { id: 'logo-3',  title: 'Logo 3' }
  ];

  // ---- Build the grid ----
  const grid = document.getElementById('grid');
  let slotIndex = 0;

  LOGO_SETS.forEach(set => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <h2 class="card-title">${set.title}</h2>
      <div class="logo-pair">
        ${['dark', 'light'].map(mode => {
          const id = `${set.id}-${mode}`;
          const pngFile = PNG_FILES[slotIndex];
          slotIndex++;
          return `
          <div class="logo-box" data-mode="${mode}" data-id="${id}"
               data-title="${set.title}" data-png="${pngFile}">
            <img class="logo-img" src="${pngFile}" alt="${set.title} ${mode} logo">
            <span class="mode-label">${mode}</span>
            <button class="tick-btn" data-id="${id}"
                    aria-label="Compare ${set.title} ${mode}">&#10003;</button>
          </div>`;
        }).join('')}
      </div>`;
    grid.appendChild(card);
  });

  // ---- Modal handling ----
  const modalOverlay = document.getElementById('modalOverlay');
  const modalBox = document.getElementById('modalBox');
  const modalStage = document.getElementById('modalStage');
  const modalTitle = document.getElementById('modalTitle');

  // Single logo "zoom" view (triggered by clicking the box itself)
  function openZoomModal(title, mode, pngFile) {
    modalBox.dataset.mode = mode;
    modalStage.innerHTML = `<img class="logo-img" src="${pngFile}" alt="${title} ${mode} logo, large">`;
    modalTitle.textContent = `${title} — ${mode === 'dark' ? 'Dark' : 'Light'} version`;
    modalOverlay.classList.add('open');
  }

  // Side-by-side comparison view (triggered once two ticks are selected)
  function openCompareModal(itemA, itemB) {
    modalBox.removeAttribute('data-mode'); // neutral outer box — panels carry their own colour
    modalTitle.textContent = 'Comparing logos';
    modalStage.innerHTML = `
      <div class="compare-grid">
        ${[itemA, itemB].map(item => `
          <div class="compare-panel" data-mode="${item.mode}">
            <img class="logo-img" src="${item.pngFile}" alt="${item.title} ${item.mode} logo">
            <span class="compare-label">${item.title} — ${item.mode === 'dark' ? 'Dark' : 'Light'}</span>
          </div>
        `).join('')}
      </div>`;
    modalOverlay.classList.add('open');
  }

  function clearComparisonSelections() {
    comparisonSelections.forEach(item => {
      const box = document.querySelector(`.logo-box[data-id="${item.id}"]`);
      if (box) {
        box.classList.remove('selected');
        const tick = box.querySelector('.tick-btn');
        if (tick) tick.classList.remove('selected');
      }
    });
    comparisonSelections.length = 0;
  }

  function closeModal() {
    modalOverlay.classList.remove('open');
    clearComparisonSelections();
  }

  document.getElementById('modalClose').addEventListener('click', closeModal);
  modalOverlay.addEventListener('click', (e) => {
    if (e.target === modalOverlay) closeModal();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
  });

  // ---- Tick-to-compare selection ----
  let comparisonSelections = []; // up to 2: { id, title, mode, pngFile }

  function toggleCompareSelection(box, tick) {
    const id = tick.dataset.id;
    const existingIndex = comparisonSelections.findIndex(item => item.id === id);

    if (existingIndex !== -1) {
      // Already selected — deselect it
      comparisonSelections.splice(existingIndex, 1);
      tick.classList.remove('selected');
      box.classList.remove('selected');
      return;
    }

    // If two are already selected, drop the oldest to make room (FIFO)
    if (comparisonSelections.length === 2) {
      const removed = comparisonSelections.shift();
      const removedBox = document.querySelector(`.logo-box[data-id="${removed.id}"]`);
      if (removedBox) {
        removedBox.classList.remove('selected');
        const removedTick = removedBox.querySelector('.tick-btn');
        if (removedTick) removedTick.classList.remove('selected');
      }
    }

    comparisonSelections.push({
      id,
      title: box.dataset.title,
      mode: box.dataset.mode,
      pngFile: box.dataset.png
    });
    tick.classList.add('selected');
    box.classList.add('selected');

    if (comparisonSelections.length === 2) {
      openCompareModal(comparisonSelections[0], comparisonSelections[1]);
    }
  }

  grid.addEventListener('click', (e) => {
    const tick = e.target.closest('.tick-btn');
    if (tick) {
      e.stopPropagation();
      toggleCompareSelection(tick.closest('.logo-box'), tick);
      return;
    }
    const box = e.target.closest('.logo-box');
    if (box) {
      openZoomModal(box.dataset.title, box.dataset.mode, box.dataset.png);
    }
  });
</script>

</body>
</html>
