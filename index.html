<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOLVOLT Logo Set</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #1A2332;
    --cream: #F7F5F2;
    --white: #FFFFFF;
    --orange: #FF8600;
    --border: #E6E2DC;
    --text-muted: #6B7280;
    --shadow-soft: 0 2px 6px rgba(15, 23, 42, 0.06), 0 1px 2px rgba(15, 23, 42, 0.05);
    --shadow-lift: 0 10px 24px rgba(15, 23, 42, 0.10), 0 2px 6px rgba(15, 23, 42, 0.06);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--cream);
    color: var(--navy);
    font-family: "Open Sans", sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .page {
    max-width: 980px;
    margin: 0 auto;
    padding: 56px 24px 120px;
  }

  header.page-head {
    text-align: center;
    margin-bottom: 48px;
  }

  h1.page-title {
    font-family: "Open Sans", sans-serif;
    font-weight: 600;
    font-size: clamp(28px, 5vw, 40px);
    margin: 0 0 10px;
    letter-spacing: -0.01em;
  }

  p.page-sub {
    margin: 0;
    color: var(--text-muted);
    font-size: 15px;
    line-height: 1.5;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 28px;
  }

  @media (max-width: 700px) {
    .grid { grid-template-columns: 1fr; }
  }

  .card {
    background: var(--white);
    border-radius: 14px;
    box-shadow: var(--shadow-soft);
    padding: 22px;
  }

  .card-title {
    font-family: "Open Sans", sans-serif;    
    font-weight: 600;
    font-size: 17px;
    margin: 0 0 14px;
  }

  .logo-pair {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
  }

  .logo-box {
    position: relative;
    flex: 1 1 130px;
    min-height: 110px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: zoom-in;
    transition: box-shadow 0.15s ease, transform 0.15s ease;
    border: 1px solid var(--border);
  }

  .logo-box:hover {
    box-shadow: var(--shadow-lift);
    transform: translateY(-1px);
  }

  .logo-box[data-mode="dark"] {
    background: var(--navy);
    border-color: var(--navy);
  }

  .logo-box[data-mode="light"] {
    background: var(--white);
  }

  .logo-box svg { width: 70%; height: auto; max-height: 60px; }

  .mode-label {
    position: absolute;
    bottom: 8px;
    left: 10px;
    font-size: 11px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .logo-box[data-mode="dark"] .mode-label { color: rgba(247,245,242,0.55); }

  .tick-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: var(--white);
    color: transparent;
    font-size: 13px;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.15s ease;
    padding: 0;
  }

  .logo-box[data-mode="dark"] .tick-btn {
    border-color: rgba(247,245,242,0.4);
    background: rgba(26,35,50,0.6);
  }

  .tick-btn:hover { border-color: var(--orange); }

  .tick-btn.selected {
    background: var(--orange);
    border-color: var(--orange);
    color: var(--white);
  }

  .logo-box.selected {
    box-shadow: 0 0 0 2px var(--orange);
  }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(26, 35, 50, 0.55);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.18s ease;
    z-index: 100;
  }

  .modal-overlay.open { opacity: 1; visibility: visible; }

  .modal-box {
    background: var(--white);
    border-radius: 14px;
    max-width: 480px;
    width: 100%;
    padding: 32px;
    text-align: center;
    box-shadow: var(--shadow-lift);
    transform: translateY(8px);
    transition: transform 0.18s ease;
  }

  .modal-overlay.open .modal-box { transform: translateY(0); }

  .modal-stage {
    border-radius: 10px;
    min-height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 18px;
  }

  .modal-stage svg { width: 60%; max-height: 140px; }

  .modal-title {
    font-family: 'Fraunces', serif;
    font-size: 16px;
    font-weight: 600;
    margin: 0 0 4px;
  }

  .modal-close {
    margin-top: 18px;
    border: 1px solid var(--border);
    background: none;
    border-radius: 8px;
    padding: 8px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    cursor: pointer;
    color: var(--navy);
  }

  .modal-close:hover { border-color: var(--navy); }

  /* Confirmation banner */
  .confirm-banner {
    position: fixed;
    left: 50%;
    bottom: 28px;
    transform: translate(-50%, 16px);
    background: var(--navy);
    color: var(--cream);
    padding: 14px 20px;
    border-radius: 10px;
    font-size: 14px;
    box-shadow: var(--shadow-lift);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease, transform 0.2s ease;
    max-width: 90vw;
    text-align: center;
  }

  .confirm-banner.show {
    opacity: 1;
    transform: translate(-50%, 0);
  }

  .confirm-banner strong { color: var(--orange); }
</style>
</head>
<body>

<div class="page">
  <header class="page-head">
    <h1 class="page-title">SOLVOLT Logo Set</h1>
    <p class="page-sub">Tap a logo to view it larger. Tap the tick to select your preferred version — a confirmation email will be sent once you choose.</p>
  </header>

  <div class="grid" id="grid"></div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <div class="modal-stage" id="modalStage"></div>
    <p class="modal-title" id="modalTitle"></p>
    <button class="modal-close" id="modalClose">Close</button>
  </div>
</div>

<div class="confirm-banner" id="confirmBanner"></div>

<script>
  // ---- Placeholder recipient for the confirmation email ----
  // Replace this with the real address (or wire sendConfirmationEmail()
  // below up to your backend / email API).
  const CONFIRMATION_EMAIL = 'placeholder@yourcompany.com';

  const COLORS = {
    dark:  { bg: '#1A2332', fg: '#F7F5F2' },
    light: { bg: '#FFFFFF', fg: '#1A2332' }
  };

  const LOGO_SETS = [
    { id: 'primary', title: 'Primary Lockup', variant: 'lockup' },
    { id: 'icon',    title: 'Icon Mark',       variant: 'icon' },
    { id: 'wordmark',title: 'Wordmark',        variant: 'wordmark' },
    { id: 'stacked', title: 'Stacked Lockup',  variant: 'stacked' }
  ];

  function boltPath() {
    return '<path d="M13 2 3 14h9l-1 8 10-12h-9l1-8z" />';
  }

  function renderLogo(variant, mode) {
    const fg = COLORS[mode].fg;
    if (variant === 'lockup') {
      return `<svg viewBox="0 0 220 50" fill="${fg}">
        <g transform="translate(0,9)">${boltPath()}</g>
        <text x="40" y="33" font-family="DM Sans, sans-serif" font-weight="600"
              font-size="26" letter-spacing="1" fill="${fg}">SOLVOLT</text>
      </svg>`;
    }
    if (variant === 'icon') {
      return `<svg viewBox="0 0 80 80" fill="none">
        <circle cx="40" cy="40" r="36" stroke="${fg}" stroke-width="2.5" />
        <g transform="translate(28,20) scale(1.1)" fill="${fg}">${boltPath()}</g>
      </svg>`;
    }
    if (variant === 'wordmark') {
      return `<svg viewBox="0 0 220 40" fill="${fg}">
        <text x="0" y="28" font-family="DM Sans, sans-serif" font-weight="600"
              font-size="28" letter-spacing="3">SOLVOLT</text>
      </svg>`;
    }
    // stacked
    return `<svg viewBox="0 0 140 100" fill="${fg}">
      <g transform="translate(54,8) scale(1.3)">${boltPath()}</g>
      <text x="70" y="86" text-anchor="middle" font-family="DM Sans, sans-serif"
            font-weight="600" font-size="20" letter-spacing="1.5">SOLVOLT</text>
    </svg>`;
  }

  // ---- Build the grid ----
  const grid = document.getElementById('grid');

  LOGO_SETS.forEach(set => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <h2 class="card-title">${set.title}</h2>
      <div class="logo-pair">
        ${['dark', 'light'].map(mode => {
          const id = `${set.id}-${mode}`;
          return `
          <div class="logo-box" data-mode="${mode}" data-id="${id}"
               data-variant="${set.variant}" data-title="${set.title}">
            ${renderLogo(set.variant, mode)}
            <span class="mode-label">${mode}</span>
            <button class="tick-btn" data-id="${id}" data-title="${set.title} — ${mode}"
                    aria-label="Select ${set.title} ${mode} version">&#10003;</button>
          </div>`;
        }).join('')}
      </div>`;
    grid.appendChild(card);
  });

  // ---- Modal handling ----
  const modalOverlay = document.getElementById('modalOverlay');
  const modalStage = document.getElementById('modalStage');
  const modalTitle = document.getElementById('modalTitle');

  function openModal(variant, mode, title) {
    modalStage.innerHTML = renderLogo(variant, mode);
    modalTitle.textContent = `${title} — ${mode === 'dark' ? 'Dark' : 'Light'} version`;
    modalOverlay.classList.add('open');
  }

  function closeModal() {
    modalOverlay.classList.remove('open');
  }

  document.getElementById('modalClose').addEventListener('click', closeModal);
  modalOverlay.addEventListener('click', (e) => {
    if (e.target === modalOverlay) closeModal();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
  });

  grid.addEventListener('click', (e) => {
    const tick = e.target.closest('.tick-btn');
    if (tick) return; // handled separately below
    const box = e.target.closest('.logo-box');
    if (box) {
      openModal(box.dataset.variant, box.dataset.mode, box.dataset.title);
    }
  });

  // ---- Selection + confirmation email (placeholder) ----
  let currentSelectionId = null;
  const banner = document.getElementById('confirmBanner');
  let bannerTimer = null;

  function showBanner(html) {
    banner.innerHTML = html;
    banner.classList.add('show');
    clearTimeout(bannerTimer);
    bannerTimer = setTimeout(() => banner.classList.remove('show'), 4500);
  }

  function sendConfirmationEmail(label) {
    // ---- PLACEHOLDER ----
    // Wire this up to a real email service, e.g.:
    // fetch('/api/send-confirmation', {
    //   method: 'POST',
    //   headers: { 'Content-Type': 'application/json' },
    //   body: JSON.stringify({ recipient: CONFIRMATION_EMAIL, logo: label })
    // });
    console.log(`[placeholder] Confirmation email sent to ${CONFIRMATION_EMAIL} for: ${label}`);
    showBanner(`<strong>Selection confirmed.</strong> A confirmation for "${label}" will be sent to ${CONFIRMATION_EMAIL}.`);
  }

  grid.addEventListener('click', (e) => {
    const tick = e.target.closest('.tick-btn');
    if (!tick) return;
    e.stopPropagation();

    const id = tick.dataset.id;
    const label = tick.dataset.title;

    // Clear previous selection visuals
    document.querySelectorAll('.tick-btn.selected').forEach(b => b.classList.remove('selected'));
    document.querySelectorAll('.logo-box.selected').forEach(b => b.classList.remove('selected'));

    if (currentSelectionId === id) {
      // Clicking the already-selected tick again clears the selection
      currentSelectionId = null;
      return;
    }

    currentSelectionId = id;
    tick.classList.add('selected');
    tick.closest('.logo-box').classList.add('selected');
    sendConfirmationEmail(label);
  });
</script>

</body>
</html>
